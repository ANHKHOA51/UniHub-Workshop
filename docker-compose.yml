version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unihub_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unihub_workshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/1_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql

  redis:
    image: redis:7-alpine
    container_name: unihub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
